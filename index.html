<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AI Assistant</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f0f13;
    --surface: #1a1a22;
    --surface2: #22222e;
    --border: rgba(255,255,255,0.08);
    --accent: #7c6ef7;
    --accent2: #a78bfa;
    --text: #f0eeff;
    --muted: #8880aa;
    --user-bubble: #2d2a4a;
    --ai-bubble: #1e1e2a;
    --radius: 16px;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  header {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--surface);
    flex-shrink: 0;
  }

  .avatar {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
  }

  .header-info h1 {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
  }

  .header-info p {
    font-size: 11px;
    color: var(--muted);
  }

  .status-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: #4ade80;
    display: inline-block;
    margin-right: 4px;
  }

  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    scroll-behavior: smooth;
  }

  #messages::-webkit-scrollbar { width: 4px; }
  #messages::-webkit-scrollbar-track { background: transparent; }
  #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .message {
    display: flex;
    gap: 10px;
    max-width: 88%;
    animation: fadeUp 0.2s ease;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .message.user { align-self: flex-end; flex-direction: row-reverse; }
  .message.ai   { align-self: flex-start; }

  .msg-avatar {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    margin-top: 2px;
  }

  .message.ai .msg-avatar {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
  }

  .message.user .msg-avatar {
    background: var(--surface2);
    color: var(--muted);
    font-size: 11px;
    font-weight: 600;
  }

  .bubble {
    padding: 11px 15px;
    border-radius: var(--radius);
    font-size: 14px;
    line-height: 1.6;
    white-space: pre-wrap;
    word-break: break-word;
  }

  .message.user .bubble {
    background: var(--user-bubble);
    border-bottom-right-radius: 4px;
    color: var(--text);
  }

  .message.ai .bubble {
    background: var(--ai-bubble);
    border: 1px solid var(--border);
    border-bottom-left-radius: 4px;
    color: var(--text);
  }

  .typing-indicator {
    display: flex;
    gap: 4px;
    align-items: center;
    padding: 14px 16px;
  }

  .typing-indicator span {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--muted);
    animation: bounce 1.2s infinite;
  }

  .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
  .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
    30% { transform: translateY(-5px); opacity: 1; }
  }

  .welcome {
    text-align: center;
    padding: 40px 20px;
    color: var(--muted);
  }

  .welcome .icon { font-size: 36px; margin-bottom: 12px; }
  .welcome h2 { font-size: 17px; font-weight: 600; color: var(--text); margin-bottom: 6px; }
  .welcome p  { font-size: 13px; line-height: 1.6; max-width: 260px; margin: 0 auto 20px; }

  .suggestions {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
  }

  .suggestion-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 7px 14px;
    border-radius: 20px;
    font-size: 12px;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.15s;
  }

  .suggestion-btn:hover {
    background: var(--user-bubble);
    border-color: var(--accent);
  }

  footer {
    padding: 14px 16px;
    border-top: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }

  .input-row {
    display: flex;
    gap: 10px;
    align-items: flex-end;
  }

  #userInput {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    color: var(--text);
    font-family: inherit;
    font-size: 14px;
    padding: 10px 14px;
    resize: none;
    max-height: 120px;
    min-height: 42px;
    outline: none;
    transition: border-color 0.15s;
    line-height: 1.5;
  }

  #userInput::placeholder { color: var(--muted); }
  #userInput:focus { border-color: var(--accent); }

  #sendBtn {
    width: 42px;
    height: 42px;
    border-radius: 12px;
    background: var(--accent);
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: opacity 0.15s, transform 0.1s;
  }

  #sendBtn:hover { opacity: 0.85; }
  #sendBtn:active { transform: scale(0.95); }
  #sendBtn:disabled { opacity: 0.4; cursor: not-allowed; }

  #sendBtn svg { width: 18px; height: 18px; fill: white; }

  .error-msg {
    background: rgba(239,68,68,0.1);
    border: 1px solid rgba(239,68,68,0.3);
    color: #fca5a5;
    padding: 10px 14px;
    border-radius: 12px;
    font-size: 13px;
  }
</style>
</head>
<body>

<header>
  <div class="avatar">✦</div>
  <div class="header-info">
    <h1>AI Assistant</h1>
    <p><span class="status-dot"></span>Online · Powered by Claude</p>
  </div>
</header>

<div id="messages">
  <div class="welcome" id="welcome">
    <div class="icon">✦</div>
    <h2>Hello! How can I help?</h2>
    <p>Ask me anything — I'm here to answer your questions.</p>
    <div class="suggestions">
      <button class="suggestion-btn" onclick="sendSuggestion(this)">What can you do?</button>
      <button class="suggestion-btn" onclick="sendSuggestion(this)">Explain a concept</button>
      <button class="suggestion-btn" onclick="sendSuggestion(this)">Write something for me</button>
      <button class="suggestion-btn" onclick="sendSuggestion(this)">Answer a question</button>
    </div>
  </div>
</div>

<footer>
  <div class="input-row">
    <textarea id="userInput" placeholder="Ask me anything…" rows="1"></textarea>
    <button id="sendBtn" onclick="sendMessage()" aria-label="Send">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>
</footer>

<script>
const messagesEl = document.getElementById('messages');
const input = document.getElementById('userInput');
const sendBtn = document.getElementById('sendBtn');
const history = [];

input.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});

input.addEventListener('input', () => {
  input.style.height = 'auto';
  input.style.height = Math.min(input.scrollHeight, 120) + 'px';
});

function sendSuggestion(btn) {
  input.value = btn.textContent;
  sendMessage();
}

function addMessage(role, text, isError = false) {
  const welcome = document.getElementById('welcome');
  if (welcome) welcome.remove();

  const wrap = document.createElement('div');
  wrap.className = `message ${role}`;

  const av = document.createElement('div');
  av.className = 'msg-avatar';
  av.textContent = role === 'ai' ? '✦' : 'You';

  const bubble = document.createElement('div');
  bubble.className = isError ? 'bubble error-msg' : 'bubble';
  bubble.textContent = text;

  wrap.appendChild(av);
  wrap.appendChild(bubble);
  messagesEl.appendChild(wrap);
  messagesEl.scrollTop = messagesEl.scrollHeight;
  return bubble;
}

function addTyping() {
  const welcome = document.getElementById('welcome');
  if (welcome) welcome.remove();

  const wrap = document.createElement('div');
  wrap.className = 'message ai';
  wrap.id = 'typing';

  const av = document.createElement('div');
  av.className = 'msg-avatar';
  av.textContent = '✦';

  const bubble = document.createElement('div');
  bubble.className = 'bubble ai-bubble';
  bubble.innerHTML = '<div class="typing-indicator"><span></span><span></span><span></span></div>';

  wrap.appendChild(av);
  wrap.appendChild(bubble);
  messagesEl.appendChild(wrap);
  messagesEl.scrollTop = messagesEl.scrollHeight;
  return wrap;
}

async function sendMessage() {
  const text = input.value.trim();
  if (!text || sendBtn.disabled) return;

  addMessage('user', text);
  history.push({ role: 'user', content: text });
  input.value = '';
  input.style.height = 'auto';
  sendBtn.disabled = true;

  const typingEl = addTyping();

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: 'You are a helpful, friendly AI assistant embedded in a presentation. Be concise and clear. Format responses for easy reading.',
        messages: history
      })
    });

    typingEl.remove();

    if (!res.ok) throw new Error(`API error ${res.status}`);
    const data = await res.json();
    const reply = data.content?.[0]?.text || 'Sorry, I could not generate a response.';

    history.push({ role: 'assistant', content: reply });
    addMessage('ai', reply);
  } catch (err) {
    typingEl.remove();
    addMessage('ai', 'Something went wrong. Please try again.', true);
    console.error(err);
  }

  sendBtn.disabled = false;
  input.focus();
}
</script>
</body>
</html>
